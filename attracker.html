    <div class="card card-custom p-4 bg-info" style="width: 400px;" id="m">
        <h3 class="text-center title-text mb-4">Attendance Tracker</h3>

        <form>
            <div class="mb-3">
                <label class="form-label fw-bold">Select Month</label>
                <select id="mOfTheWeek" class="form-select">
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March">March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                    <option value="June">June</option>
                    <option value="July">July</option>
                    <option value="August">August</option>
                    <option value="September">September</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Absences</label>
                <input type="number" id="absences" class="form-control" placeholder="Enter number of absences">
            </div>

            <div class="d-grid">
                <input type="button" class="btn btn-primary" py-click="displaying" value="Submit" class="btn btn-custom">
            </div>
        </form>

        <div id="output" class="mt-3 p-2 text-center fs-5"></div>
    </div>

     <br> <br> <br> <br>
